name: CI

on:
  push:
  pull_request:

jobs:
  backend-ingest-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-ingest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend-ingest/requirements*.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install ../shared
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Pytest (Django ingest)
        env:
          DJANGO_SECRET_KEY: ci-test-not-for-production
          DEBUG: "false"
        run: pytest -q --no-header
